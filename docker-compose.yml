services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME:-laravel}_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - php
    networks:
      - laravel

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-laravel}_php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - laravel
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PHP_OPCACHE_ENABLE=${PHP_OPCACHE_ENABLE:-1}
      - PHP_OPCACHE_MEMORY_CONSUMPTION=${PHP_OPCACHE_MEMORY_CONSUMPTION:-128}
      - PHP_OPCACHE_INTERNED_STRINGS_BUFFER=${PHP_OPCACHE_INTERNED_STRINGS_BUFFER:-8}
      - PHP_OPCACHE_MAX_ACCELERATED_FILES=${PHP_OPCACHE_MAX_ACCELERATED_FILES:-4000}
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-1}
      - PHP_OPCACHE_FAST_SHUTDOWN=${PHP_OPCACHE_FAST_SHUTDOWN:-1}

  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-laravel}_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:9.2
    container_name: ${APP_NAME:-laravel}_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - laravel

  node:
    image: node:20.18-alpine
    container_name: ${APP_NAME:-laravel}_node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5173}:5173"
    networks:
      - laravel
    environment:
      - VITE_APP_URL=${APP_URL:-http://localhost}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  searoute:
    image: node:20.18-alpine
    container_name: ${APP_NAME:-laravel}_searoute
    restart: unless-stopped
    working_dir: /var/www/html/docker/searoute
    volumes:
      - ./:/var/www/html
    command: node server.cjs
    expose:
      - "3001"
    networks:
      - laravel

  simulation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-laravel}_simulation
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan simulation:worker --interval=10
    networks:
      - laravel
    depends_on:
      php:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env

  redis:
    image: redis:7.2-alpine
    container_name: ${APP_NAME:-laravel}_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Опційно: Mailpit + queue-воркер. Запуск: docker compose --profile mail up -d
  # Без profile за замовчуванням додаток працює з QUEUE_CONNECTION=sync і MAIL_MAILER=log у .env.
  mailpit:
    profiles: [mail]
    image: axllent/mailpit:latest
    container_name: ${APP_NAME:-laravel}_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - laravel

  queue:
    profiles: [mail]
    image: vuelarcontainer-php:latest
    container_name: ${APP_NAME:-laravel}_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    networks:
      - laravel
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env

  # Long-poll worker for the bot (required for /start, keyboards, linking). Start: docker compose --profile tg up -d telegram
  telegram:
    profiles: [tg]
    image: vuelarcontainer-php:latest
    container_name: ${APP_NAME:-laravel}_telegram
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan telegram:poll
    networks:
      - laravel
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  laravel:
    driver: bridge

